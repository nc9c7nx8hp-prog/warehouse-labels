<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;font-family:'Courier New',monospace;color:#f1f5f9;min-height:100vh}
header{background:#1e293b;border-bottom:1px solid #334155;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:9px;letter-spacing:3px;color:#64748b}
.content{padding:20px 16px;max-width:600px;margin:0 auto}
.map-wrap{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:20px}
svg{width:100%;height:auto;display:block}
.zone{cursor:pointer;opacity:0.85;transition:opacity 0.2s}
.zone:hover{opacity:1}
.zlabel{font-size:10px;font-weight:700;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:middle}
.zcount{font-size:13px;font-weight:900;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:middle}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.legend-item{background:#1e293b;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-text{font-size:11px;font-weight:700}
.legend-count{margin-left:auto;font-size:11px;color:#64748b}
.panel{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px;display:none}
.panel-title{font-size:10px;letter-spacing:2px;color:#64748b;margin-bottom:12px}
.roll-item{padding:10px 0;border-bottom:1px solid #334155;font-size:12px}
.roll-item:last-child{border-bottom:none}
.roll-mp{font-weight:800;font-size:14px}
.roll-meta{color:#94a3b8;margin-top:2px}
.btn{width:100%;padding:12px;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Courier New',monospace;background:#334155}
.loading{text-align:center;color:#475569;padding:20px;font-size:12px}
</style>
</head>
<body>
<header>
  <div>
    <div class="header-sub">WAREHOUSE</div>
    <div class="header-title">Zone Map</div>
  </div>
  <span id="total" style="font-size:11px;color:#64748b"></span>
</header>

<div class="content">
  <div id="loading" class="loading">Loading inventory...</div>

  <div id="map-container" style="display:none">
    <div class="map-wrap">
      <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">

        <!-- Zone 6 - Green - Floor 6&7 - left side -->
        <rect class="zone" x="10" y="10" width="80" height="200" rx="6" fill="#16a34a" onclick="showZone('Zone 6')"/>
        <text class="zlabel" x="50" y="95">ZONE 6</text>
        <text class="zcount" x="50" y="115" id="c6">0</text>

        <!-- Zone 4 - Purple - W1-W16 - top center -->
        <rect class="zone" x="100" y="10" width="190" height="60" rx="6" fill="#7c3aed" onclick="showZone('Zone 4')"/>
        <text class="zlabel" x="195" y="35">ZONE 4</text>
        <text class="zcount" x="195" y="52" id="c4">0</text>

        <!-- Zone 5 - Blue - Floor 2 - top right -->
        <rect class="zone" x="300" y="10" width="90" height="100" rx="6" fill="#0ea5e9" onclick="showZone('Zone 5')"/>
        <text class="zlabel" x="345" y="55">ZONE 5</text>
        <text class="zcount" x="345" y="72" id="c5">0</text>

        <!-- Zone 3 - Pink - ST1 ST2 - center -->
        <rect class="zone" x="100" y="80" width="100" height="70" rx="6" fill="#f472b6" onclick="showZone('Zone 3')"/>
        <text class="zlabel" x="150" y="110">ZONE 3</text>
        <text class="zcount" x="150" y="128" id="c3">0</text>

        <!-- Zone 2 - Gray - Floor 4 - center right -->
        <rect class="zone" x="210" y="80" width="180" height="110" rx="6" fill="#64748b" onclick="showZone('Zone 2')"/>
        <text class="zlabel" x="300" y="130">ZONE 2</text>
        <text class="zcount" x="300" y="148" id="c2">0</text>

        <!-- Zone 1 - Yellow - Slitting - bottom center -->
        <rect class="zone" x="100" y="160" width="200" height="130" rx="6" fill="#eab308" onclick="showZone('Zone 1')"/>
        <text class="zlabel" x="200" y="220">ZONE 1</text>
        <text class="zcount" x="200" y="238" id="c1">0</text>

      </svg>
    </div>

    <div class="legend">
      <div class="legend-item" onclick="showZone('Zone 1')"><div class="legend-dot" style="background:#eab308"></div><span class="legend-text">Zone 1 — Slitting</span><span class="legend-count" id="l1">0</span></div>
      <div class="legend-item" onclick="showZone('Zone 2')"><div class="legend-dot" style="background:#64748b"></div><span class="legend-text">Zone 2 — Floor 4</span><span class="legend-count" id="l2">0</span></div>
      <div class="legend-item" onclick="showZone('Zone 3')"><div class="legend-dot" style="background:#f472b6"></div><span class="legend-text">Zone 3 — ST1/ST2</span><span class="legend-count" id="l3">0</span></div>
      <div class="legend-item" onclick="showZone('Zone 4')"><div class="legend-dot" style="background:#7c3aed"></div><span class="legend-text">Zone 4 — W1-W16</span><span class="legend-count" id="l4">0</span></div>
      <div class="legend-item" onclick="showZone('Zone 5')"><div class="legend-dot" style="background:#0ea5e9"></div><span class="legend-text">Zone 5 — Floor 2</span><span class="legend-count" id="l5">0</span></div>
      <div class="legend-item" onclick="showZone('Zone 6')"><div class="legend-dot" style="background:#16a34a"></div><span class="legend-text">Zone 6 — Floor 6/7</span><span class="legend-count" id="l6">0</span></div>
    </div>

    <div class="panel" id="zone-panel">
      <div class="panel-title" id="panel-title">ZONE</div>
      <div id="panel-rolls"></div>
      <button class="btn" onclick="document.getElementById('zone-panel').style.display='none'">CLOSE</button>
    </div>
  </div>
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbyrccwCiKCcEiXVl5-OUTpuiakiqku1_4LRFwg3Mps_TQJPF4WT__nh2KOyEf9lQrZPsw/exec";

var ZONE_COORDS = {
  "Zone 1": {lat:43.72266976, lng:-79.66347557},
  "Zone 2": {lat:43.72272089, lng:-79.66354701},
  "Zone 3": {lat:43.72268749, lng:-79.66355699},
  "Zone 4": {lat:43.72255541, lng:-79.66357186},
  "Zone 5": {lat:43.72255385, lng:-79.66354707},
  "Zone 6": {lat:43.72259618, lng:-79.66358923}
};

var inventory = [];
var scanned = [];

function getZoneFromCoords(lat, lng) {
  if (!lat || !lng || lat === "denied" || lat === "unavailable" || lat === "") return null;
  var latF = parseFloat(lat);
  var lngF = parseFloat(lng);
  if (isNaN(latF) || isNaN(lngF)) return null;
  var minDist = Infinity;
  var nearest = null;
  Object.keys(ZONE_COORDS).forEach(function(zone) {
    var z = ZONE_COORDS[zone];
    var dist = Math.pow(latF - z.lat, 2) + Math.pow(lngF - z.lng, 2);
    if (dist < minDist) { minDist = dist; nearest = zone; }
  });
  return nearest;
}

async function loadData() {
  try {
    // Load inventory
    var res1 = await fetch(API + "?t=" + Date.now());
    var json1 = await res1.json();
    inventory = json1.data || [];

    // Load scanned data
    var res2 = await fetch("https://script.google.com/macros/s/AKfycbwboD1O1qxOpkBdEjSrJA5cgGx1Q0EVE8mjY6laSP-GNosjemU7a1WDITQ2OesLX1efyQ/exec?action=scanned&t=" + Date.now());
    var json2 = await res2.json();
    scanned = json2.data || [];

    renderMap();
    document.getElementById("loading").style.display = "none";
    document.getElementById("map-container").style.display = "block";
    document.getElementById("total").textContent = inventory.length + " rolls";
  } catch(e) {
    document.getElementById("loading").textContent = "Error loading data";
  }
}

function getLatestZoneForRoll(id) {
  // Find most recent scan for this roll
  var rollScans = scanned.filter(function(s) { return String(s.ID) === String(id); });
  if (!rollScans.length) return null;
  // Sort by scan time descending
  rollScans.sort(function(a, b) { return String(b.SCAN_TIME) > String(a.SCAN_TIME) ? 1 : -1; });
  var latest = rollScans[0];
  // Try coords first
  var zone = getZoneFromCoords(latest.LAT, latest.LNG);
  if (zone) return zone;
  // Fall back to location field
  return latest.LOCATION || null;
}

function renderMap() {
  var counts = {"Zone 1":0,"Zone 2":0,"Zone 3":0,"Zone 4":0,"Zone 5":0,"Zone 6":0};

  inventory.forEach(function(r) {
    // Try scanned coords first
    var zone = getLatestZoneForRoll(r.ID);
    // Fall back to LOCATION field in inventory
    if (!zone) zone = r.LOCATION;
    if (zone && counts[zone] !== undefined) counts[zone]++;
  });

  Object.keys(counts).forEach(function(zone) {
    var n = zone.replace("Zone ","");
    var el = document.getElementById("c"+n);
    var ll = document.getElementById("l"+n);
    if (el) el.textContent = counts[zone];
    if (ll) ll.textContent = counts[zone] + " rolls";
  });
}

function showZone(zone) {
  var panel = document.getElementById("zone-panel");
  var title = document.getElementById("panel-title");
  var list  = document.getElementById("panel-rolls");

  title.textContent = zone.toUpperCase();

  var zoneRolls = inventory.filter(function(r) {
    var z = getLatestZoneForRoll(r.ID) || r.LOCATION;
    return z === zone;
  });

  if (!zoneRolls.length) {
    list.innerHTML = '<div style="color:#475569;font-size:12px;padding:12px 0">No rolls in this zone.</div>';
  } else {
    list.innerHTML = zoneRolls.map(function(r) {
      return '<div class="roll-item"><div class="roll-mp">' + r.MP + '</div>' +
        '<div class="roll-meta">B#' + r.BATCH + ' &middot; ' + r.LENGTH + ' &middot; ' + (r.CATEGORY||"") + '</div></div>';
    }).join("");
  }
  panel.style.display = "block";
  panel.scrollIntoView({behavior:"smooth"});
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
